<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" class="map-svg">
  <defs>
    <style>
      .sector { fill: #1E2734; stroke: #2D3A4D; stroke-width: 1; transition: all 0.2s; }
      .sector:hover { filter: brightness(1.3); stroke: #E2E8F0; }
      .gate { fill: #FFD700; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .gate-marker { fill: #FFD700; stroke: #B8960F; stroke-width: 1; cursor: pointer; }
      .gate-marker:hover { transform: scale(1.2); }
      .concession { fill: #3D4F66; stroke: #2D3A4D; stroke-width: 0.5; }
      .restroom { fill: #4A5568; stroke: #2D3A4D; stroke-width: 0.5; }
      .field { fill: #00A651; stroke: #FFFFFF; stroke-width: 2; }
      .label { fill: #94A3B8; font-family: 'Inter', system-ui, sans-serif; font-size: 10px; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
      .concourse-area { fill: #151B26; stroke: #2D3A4D; stroke-width: 1; }
      .prediction-bottleneck { fill: none; stroke: #FFB300; stroke-width: 2; stroke-dasharray: 6 4; opacity: 0.6; animation: dashFlow 1s linear infinite; }
    </style>
    <pattern id="concessionPattern" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3D4F66"/>
      <rect width="4" height="4" fill="#4A5568"/>
      <rect x="4" y="4" width="4" height="4" fill="#4A5568"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0B0F19"/>

  <!-- Outer ring / concourse zone -->
  <ellipse cx="400" cy="300" rx="360" ry="260" fill="none" stroke="#2D3A4D" stroke-width="40"/>
  
  <!-- Concourse inner area (walkable) -->
  <ellipse cx="400" cy="300" rx="340" ry="240" fill="#151B26" stroke="none"/>

  <!-- Upper bowl sectors (201-212) -->
  <!-- Upper North -->
  <path d="M 300,60 A 200,150 0 0,1 500,60 L 480,120 A 180,130 0 0,0 320,120 Z" class="sector" id="sector-212"/>
  <path d="M 500,60 A 200,150 0 0,1 680,160 L 640,200 A 180,130 0 0,0 480,120 Z" class="sector" id="sector-201"/>
  <path d="M 680,160 A 200,150 0 0,1 740,320 L 680,320 A 180,130 0 0,0 640,200 Z" class="sector" id="sector-202"/>
  <path d="M 740,320 A 200,150 0 0,1 680,480 L 640,440 A 180,130 0 0,0 680,320 Z" class="sector" id="sector-203"/>
  <path d="M 680,480 A 200,150 0 0,1 500,540 L 480,480 A 180,130 0 0,0 640,440 Z" class="sector" id="sector-204"/>
  <path d="M 500,540 A 200,150 0 0,1 300,540 L 320,480 A 180,130 0 0,0 480,480 Z" class="sector" id="sector-205"/>
  <path d="M 300,540 A 200,150 0 0,1 120,480 L 160,440 A 180,130 0 0,0 320,480 Z" class="sector" id="sector-206"/>
  <path d="M 120,480 A 200,150 0 0,1 60,320 L 120,320 A 180,130 0 0,0 160,440 Z" class="sector" id="sector-207"/>
  <path d="M 60,320 A 200,150 0 0,1 120,160 L 160,200 A 180,130 0 0,0 120,320 Z" class="sector" id="sector-208"/>
  <path d="M 120,160 A 200,150 0 0,1 300,60 L 320,120 A 180,130 0 0,0 160,200 Z" class="sector" id="sector-209"/>
  <path d="M 300,60 A 200,150 0 0,0 220,100 L 320,120 A 180,130 0 0,0 300,60 Z" class="sector" id="sector-210"/>
  <path d="M 220,100 A 200,150 0 0,0 140,140 L 320,120 A 180,130 0 0,0 220,100 Z" class="sector" id="sector-211"/>

  <!-- Lower bowl sectors (101-112) -->
  <!-- Lower North -->
  <path d="M 320,120 A 180,130 0 0,1 480,120 L 460,180 A 160,110 0 0,0 340,180 Z" class="sector" id="sector-112"/>
  <path d="M 480,120 A 180,130 0 0,1 640,200 L 600,240 A 160,110 0 0,0 460,180 Z" class="sector" id="sector-101"/>
  <path d="M 640,200 A 180,130 0 0,1 680,320 L 620,320 A 160,110 0 0,0 600,240 Z" class="sector" id="sector-102"/>
  <path d="M 680,320 A 180,130 0 0,1 640,440 L 600,400 A 160,110 0 0,0 620,320 Z" class="sector" id="sector-103"/>
  <path d="M 640,440 A 180,130 0 0,1 480,480 L 460,420 A 160,110 0 0,0 600,400 Z" class="sector" id="sector-104"/>
  <path d="M 480,480 A 180,130 0 0,1 320,480 L 340,420 A 160,110 0 0,0 460,420 Z" class="sector" id="sector-105"/>
  <path d="M 320,480 A 180,130 0 0,1 160,440 L 200,400 A 160,110 0 0,0 340,420 Z" class="sector" id="sector-106"/>
  <path d="M 160,440 A 180,130 0 0,1 120,320 L 180,320 A 160,110 0 0,0 200,400 Z" class="sector" id="sector-107"/>
  <path d="M 120,320 A 180,130 0 0,1 160,200 L 200,240 A 160,110 0 0,0 180,320 Z" class="sector" id="sector-108"/>
  <path d="M 160,200 A 180,130 0 0,1 320,120 L 340,180 A 160,110 0 0,0 200,240 Z" class="sector" id="sector-109"/>
  <path d="M 320,120 A 180,130 0 0,0 240,160 L 340,180 A 160,110 0 0,0 320,120 Z" class="sector" id="sector-110"/>
  <path d="M 240,160 A 180,130 0 0,0 180,180 L 340,180 A 160,110 0 0,0 240,160 Z" class="sector" id="sector-111"/>

  <!-- Field/Center -->
  <ellipse cx="400" cy="300" rx="100" ry="80" class="field" id="field"/>

  <!-- Concession blocks on concourse -->
  <g id="concessions">
    <!-- North concourse -->
    <rect x="360" y="100" width="80" height="30" rx="4" class="concession" id="concession-north"/>
    <!-- East concourse -->
    <rect x="670" y="270" width="30" height="80" rx="4" class="concession" id="concession-east"/>
    <!-- South concourse -->
    <rect x="360" y="470" width="80" height="30" rx="4" class="concession" id="concession-south"/>
    <!-- West concourse -->
    <rect x="90" y="270" width="30" height="80" rx="4" class="concession" id="concession-west"/>
  </g>

  <!-- Restrooms on concourse -->
  <g id="restrooms">
    <!-- Near Gate A -->
    <rect x="210" y="130" width="25" height="25" rx="3" class="restroom" id="restroom-a"/>
    <!-- Near Gate C -->
    <rect x="660" y="280" width="25" height="25" rx="3" class="restroom" id="restroom-c"/>
    <!-- Near Gate E -->
    <rect x="390" y="510" width="25" height="25" rx="3" class="restroom" id="restroom-e"/>
    <!-- Near Gate F -->
    <rect x="90" y="390" width="25" height="25" rx="3" class="restroom" id="restroom-f"/>
  </g>

  <!-- Entry Gates -->
  <g id="gates">
    <!-- Gate A (North) -->
    <circle cx="400" cy="30" r="12" class="gate-marker" id="gate-a"/>
    <text x="400" y="35" class="gate">A</text>
    
    <!-- Gate B (Northeast) -->
    <circle cx="640" cy="120" r="12" class="gate-marker" id="gate-b"/>
    <text x="640" y="125" class="gate">B</text>
    
    <!-- Gate C (East) -->
    <circle cx="720" cy="300" r="12" class="gate-marker" id="gate-c"/>
    <text x="720" y="305" class="gate">C</text>
    
    <!-- Gate D (Southeast) -->
    <circle cx="580" cy="520" r="12" class="gate-marker" id="gate-d"/>
    <text x="580" y="525" class="gate">D</text>
    
    <!-- Gate E (South) -->
    <circle cx="400" cy="570" r="12" class="gate-marker" id="gate-e"/>
    <text x="400" y="575" class="gate">E</text>
    
    <!-- Gate F (West) -->
    <circle cx="50" cy="300" r="12" class="gate-marker" id="gate-f"/>
    <text x="50" y="305" class="gate">F</text>
  </g>

  <!-- Sector Labels -->
  <g id="sector-labels">
    <!-- Lower bowl labels -->
    <text x="400" y="150" class="label" id="label-112">112</text>
    <text x="540" y="210" class="label" id="label-101">101</text>
    <text x="650" y="300" class="label" id="label-102">102</text>
    <text x="620" y="420" class="label" id="label-103">103</text>
    <text x="520" y="480" class="label" id="label-104">104</text>
    <text x="400" y="510" class="label" id="label-105">105</text>
    <text x="280" y="480" class="label" id="label-106">106</text>
    <text x="180" y="380" class="label" id="label-107">107</text>
    <text x="150" y="280" class="label" id="label-108">108</text>
    <text x="260" y="190" class="label" id="label-109">109</text>
    <text x="350" y="150" class="label" id="label-110">110</text>
    <text x="320" y="160" class="label" id="label-111">111</text>

    <!-- Upper bowl labels -->
    <text x="400" y="80" class="label" id="label-212">212</text>
    <text x="590" y="130" class="label" id="label-201">201</text>
    <text x="710" y="280" class="label" id="label-202">202</text>
    <text x="680" y="450" class="label" id="label-203">203</text>
    <text x="590" y="500" class="label" id="label-204">204</text>
    <text x="400" y="530" class="label" id="label-205">205</text>
    <text x="210" y="500" class="label" id="label-206">206</text>
    <text x="90" y="400" class="label" id="label-207">207</text>
    <text x="80" y="240" class="label" id="label-208">208</text>
    <text x="200" y="120" class="label" id="label-209">209</text>
    <text x="310" y="90" class="label" id="label-210">210</text>
    <text x="270" y="110" class="label" id="label-211">211</text>
  </g>

  <!-- Interactive layer for incident pins (populated via JS) -->
  <g id="incident-layer"></g>

  <!-- Interactive layer for predictions (populated via JS) -->
  <g id="prediction-layer"></g>

  <!-- Interactive layer for heatmap (populated via JS) -->
  <g id="heatmap-layer"></g>
</svg>